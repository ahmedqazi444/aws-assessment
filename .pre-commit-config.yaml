# .pre-commit-config.yaml
# Pre-commit hooks for Terraform IaC quality
# Combines easygenerator/operations-terraform conventions
# with patterns from felipetrindade.com/terraform-ci-cd
#
# Install: pip install pre-commit && pre-commit install
# Run all: pre-commit run --all-files

default_install_hook_types: [pre-commit, commit-msg]
repos:
  # ── Conventional commits ──────────────────────────────────
  - repo: https://github.com/compilerla/conventional-pre-commit
    rev: v2.1.1
    hooks:
      - id: conventional-pre-commit
        stages: [commit-msg]

  # ── Terraform hooks ───────────────────────────────────────
  - repo: https://github.com/antonbabenko/pre-commit-terraform
    rev: v1.99.5
    hooks:
      - id: terraform_fmt
        stages: [pre-commit]
        args:
          - --hook-config=--parallelism-ci-cpu-cores=2

      - id: terraform_docs
        stages: [pre-commit]
        args:
          - --hook-config=--create-file-if-not-exist=true
          - "--args=--lockfile=false"

      - id: terraform_validate
        stages: [pre-commit]
        args:
          - --hook-config=--retry-once-with-cleanup=true
          - --hook-config=--parallelism-ci-cpu-cores=2

      - id: terraform_providers_lock
        stages: [pre-commit]
        args:
          - --args=-platform=linux_amd64
          - --args=-platform=linux_arm64
          - --args=-platform=darwin_arm64
          - --args=-platform=darwin_amd64
          - --hook-config=--mode=always-regenerate-lockfile

      - id: terraform_tflint
        stages: [pre-commit]
        args:
          - --args=--config=__GIT_WORKING_DIR__/.tflint.hcl
          - --args=--minimum-failure-severity=error
          - --hook-config=--parallelism-ci-cpu-cores=1

      - id: terraform_trivy
        stages: [pre-commit]
        args:
          - --hook-config=--parallelism-limit=1
          - --args=--severity HIGH,CRITICAL
          - --args=--ignorefile=__GIT_WORKING_DIR__/.trivyignore
          - --args=--skip-dirs=**/.terraform