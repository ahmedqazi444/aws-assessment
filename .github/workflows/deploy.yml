name: Terraform

on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - '.editorconfig'
  pull_request:
    branches: [main]
    paths-ignore:
      - '**.md'
      - '.editorconfig'
  issue_comment:
    types: [created]
  workflow_dispatch:
    inputs:
      action:
        description: 'Action to perform'
        required: true
        type: choice
        options:
          - plan
          - apply
          - destroy
        default: plan
      component:
        description: 'Component to deploy'
        required: true
        type: choice
        options:
          - all
          - global
          - us-east-1
          - eu-west-1
        default: all

permissions:
  contents: read
  pull-requests: write
  id-token: write

env:
  TF_VERSION: "1.10.0"
  AWS_REGION: "us-east-1"

jobs:
  #────────────────────────────────────────────────────────────────
  # CI CHECKS - Run on PR and push to main
  #────────────────────────────────────────────────────────────────
  fmt:
    name: Terraform Format
    runs-on: ubuntu-latest
    if: |
      github.event_name != 'issue_comment' &&
      !(github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'destroy')
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      - name: Terraform Format Check
        run: terraform fmt -check -recursive -diff

  validate:
    name: Validate ${{ matrix.component }}
    runs-on: ubuntu-latest
    if: |
      github.event_name != 'issue_comment' &&
      !(github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'destroy')
    strategy:
      matrix:
        component: [global, us-east-1, eu-west-1]
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
      - name: Terraform Init
        run: terraform init -backend=false
        working-directory: environments/${{ matrix.component }}
      - name: Terraform Validate
        run: terraform validate
        working-directory: environments/${{ matrix.component }}

  tflint:
    name: TFLint
    runs-on: ubuntu-latest
    if: |
      github.event_name != 'issue_comment' &&
      !(github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'destroy')
    steps:
      - uses: actions/checkout@v4
      - uses: terraform-linters/setup-tflint@v6
      - name: Init TFLint
        run: tflint --init
        env:
          GITHUB_TOKEN: ${{ github.token }}
      - name: Run TFLint
        run: tflint --recursive --minimum-failure-severity=error

  trivy:
    name: Trivy Security Scan
    runs-on: ubuntu-latest
    if: |
      github.event_name != 'issue_comment' &&
      !(github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'destroy')
    steps:
      - uses: actions/checkout@v4
      - name: Trivy Setup
        uses: aquasecurity/setup-trivy@v0.2.5
        with:
          cache: true
          version: v0.69.3
      - name: Run Trivy scanner
        id: trivy
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: 'config'
          scan-ref: '.'
          format: 'table'
          output: './trivy-report.txt'
          trivy-config: trivy.yaml
          skip-setup-trivy: true
        continue-on-error: true
      - name: Report to PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            let report = '';
            try {
              report = fs.readFileSync('./trivy-report.txt', 'utf8');
            } catch (e) {
              report = '';
            }
            const output = `## Trivy Security Scan
            \`\`\`
            ${report.length > 0 ? report : 'No issues found'}
            \`\`\`
            *Pushed by: @${{ github.actor }}*`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            })
      - name: Trivy Status
        if: steps.trivy.outcome == 'failure'
        run: exit 1

  #────────────────────────────────────────────────────────────────
  # PLAN - Global (runs first, skipped for region-only deploys)
  # SECURITY: Only runs on push to main or workflow_dispatch (not PRs)
  #────────────────────────────────────────────────────────────────
  plan-global:
    name: Plan Global
    runs-on: ubuntu-latest
    needs: [fmt, validate, tflint, trivy]
    if: |
      github.event_name != 'issue_comment' &&
      github.event_name != 'pull_request' &&
      !(github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'destroy') &&
      !(github.event_name == 'workflow_dispatch' &&
        (github.event.inputs.component == 'us-east-1' || github.event.inputs.component == 'eu-west-1'))
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Terraform Plan
        uses: dflook/terraform-plan@v2
        with:
          path: environments/global
          label: global

  #────────────────────────────────────────────────────────────────
  # PLAN - Regional (runs after global plan, requires global state to exist)
  # SECURITY: Only runs on push to main or workflow_dispatch (not PRs)
  #────────────────────────────────────────────────────────────────
  plan-regions:
    name: Plan ${{ matrix.region }}
    runs-on: ubuntu-latest
    needs: [plan-global]
    if: |
      always() && (
        needs.plan-global.result == 'success' ||
        needs.plan-global.result == 'skipped'
      ) && (
        github.event_name == 'push' ||
        (github.event_name == 'workflow_dispatch' && github.event.inputs.action != 'destroy')
      )
    strategy:
      matrix:
        region: [us-east-1, eu-west-1]
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Check component filter
        id: check
        run: |
          COMPONENT="${{ github.event.inputs.component }}"
          REGION="${{ matrix.region }}"
          if [[ "${{ github.event_name }}" != "workflow_dispatch" ]] || [[ "$COMPONENT" == "all" ]] || [[ "$COMPONENT" == "$REGION" ]]; then
            echo "skip=false" >> $GITHUB_OUTPUT
          else
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "Skipping $REGION (component filter: $COMPONENT)"
          fi
      - uses: actions/checkout@v4
        if: steps.check.outputs.skip != 'true'
      - name: Configure AWS Credentials
        if: steps.check.outputs.skip != 'true'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Terraform Plan
        if: steps.check.outputs.skip != 'true'
        uses: dflook/terraform-plan@v2
        with:
          path: environments/${{ matrix.region }}
          label: ${{ matrix.region }}
          variables: |
            sns_topic_arn = "${{ secrets.SNS_TOPIC_ARN }}"
            send_sns = true

  #────────────────────────────────────────────────────────────────
  # APPLY - Global first
  #────────────────────────────────────────────────────────────────
  apply-global:
    name: Apply Global
    runs-on: ubuntu-latest
    needs: [plan-global]
    if: |
      always() && (
        (github.ref == 'refs/heads/main' && github.event_name == 'push' && needs.plan-global.result == 'success') ||
        (github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'apply' &&
         (github.event.inputs.component == 'all' || github.event.inputs.component == 'global') &&
         needs.plan-global.result == 'success') ||
        (github.event_name == 'issue_comment' && github.event.issue.pull_request &&
         contains(github.event.comment.body, 'terraform apply'))
      )
    environment: global
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'issue_comment' && format('refs/pull/{0}/head', github.event.issue.number) || github.ref }}
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Terraform Apply
        uses: dflook/terraform-apply@v2
        with:
          path: environments/global
          label: global
          auto_approve: ${{ github.event_name == 'push' || github.event_name == 'workflow_dispatch' }}

  #────────────────────────────────────────────────────────────────
  # APPLY - Regions (after global apply and regional plans)
  #────────────────────────────────────────────────────────────────
  apply-regions:
    name: Apply ${{ matrix.region }}
    runs-on: ubuntu-latest
    needs: [apply-global, plan-regions]
    if: |
      always() && needs.plan-regions.result == 'success' && (
        (github.ref == 'refs/heads/main' && github.event_name == 'push' &&
         needs.apply-global.result == 'success') ||
        (github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'apply' &&
         (needs.apply-global.result == 'success' || needs.apply-global.result == 'skipped')) ||
        (github.event_name == 'issue_comment' && github.event.issue.pull_request &&
         contains(github.event.comment.body, 'terraform apply'))
      )
    strategy:
      matrix:
        region: [us-east-1, eu-west-1]
    environment: ${{ matrix.region }}
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Check component filter
        id: check
        run: |
          COMPONENT="${{ github.event.inputs.component }}"
          REGION="${{ matrix.region }}"
          if [[ "${{ github.event_name }}" != "workflow_dispatch" ]] || [[ "$COMPONENT" == "all" ]] || [[ "$COMPONENT" == "$REGION" ]]; then
            echo "skip=false" >> $GITHUB_OUTPUT
          else
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "Skipping $REGION (component filter: $COMPONENT)"
          fi
      - uses: actions/checkout@v4
        if: steps.check.outputs.skip != 'true'
        with:
          ref: ${{ github.event_name == 'issue_comment' && format('refs/pull/{0}/head', github.event.issue.number) || github.ref }}
      - name: Configure AWS Credentials
        if: steps.check.outputs.skip != 'true'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Terraform Apply
        if: steps.check.outputs.skip != 'true'
        uses: dflook/terraform-apply@v2
        with:
          path: environments/${{ matrix.region }}
          label: ${{ matrix.region }}
          auto_approve: ${{ github.event_name == 'push' || github.event_name == 'workflow_dispatch' }}
          variables: |
            sns_topic_arn = "${{ secrets.SNS_TOPIC_ARN }}"
            send_sns = true

  #────────────────────────────────────────────────────────────────
  # TEST - Runs after all Apply jobs
  #────────────────────────────────────────────────────────────────
  test:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [apply-regions]
    if: needs.apply-regions.result == 'success'
    steps:
      - uses: actions/checkout@v4
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
          terraform_wrapper: false
      - name: Generate Test Config
        run: |
          # Get outputs from all states
          cd environments/global && terraform init -input=false
          COGNITO_POOL_ID=$(terraform output -raw cognito_user_pool_id)
          COGNITO_CLIENT_ID=$(terraform output -raw cognito_client_id)
          SECRET_NAME=$(terraform output -raw secret_name)
          TEST_USER=$(terraform output -raw test_user_email)
          cd ../..

          cd environments/us-east-1 && terraform init -input=false
          API_URL_US=$(terraform output -raw api_gateway_url)
          cd ../..

          cd environments/eu-west-1 && terraform init -input=false
          API_URL_EU=$(terraform output -raw api_gateway_url)
          cd ../..

          mkdir -p test
          cat > test/test_config.json << EOF
          {
            "api_urls": {
              "us-east-1": "${API_URL_US}",
              "eu-west-1": "${API_URL_EU}"
            },
            "cognito": {
              "user_pool_id": "${COGNITO_POOL_ID}",
              "client_id": "${COGNITO_CLIENT_ID}",
              "region": "us-east-1"
            },
            "secret_name": "${SECRET_NAME}",
            "test_user": "${TEST_USER}"
          }
          EOF
      - name: Run Test Script
        run: bash test/test_deployment.sh

  #────────────────────────────────────────────────────────────────
  # DESTROY PLAN - Preview what will be destroyed
  #────────────────────────────────────────────────────────────────
  destroy-plan:
    name: Destroy Plan ${{ matrix.component }}
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'issue_comment' &&
      github.event.issue.pull_request &&
      contains(github.event.comment.body, 'terraform destroy-plan')
    strategy:
      matrix:
        component: [eu-west-1, us-east-1, global]
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ format('refs/pull/{0}/head', github.event.issue.number) }}
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Terraform Destroy Plan
        uses: dflook/terraform-plan@v2
        with:
          path: environments/${{ matrix.component }}
          label: destroy-${{ matrix.component }}
          destroy: true
          variables: |
            sns_topic_arn = "${{ secrets.SNS_TOPIC_ARN }}"
            send_sns = true

  #────────────────────────────────────────────────────────────────
  # DESTROY - Regions first, then global
  #────────────────────────────────────────────────────────────────
  destroy-regions:
    name: Destroy ${{ matrix.region }}
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'destroy') ||
      (github.event_name == 'issue_comment' && github.event.issue.pull_request &&
       contains(github.event.comment.body, 'terraform destroy') &&
       !contains(github.event.comment.body, 'terraform destroy-plan'))
    strategy:
      matrix:
        region: [eu-west-1, us-east-1]
      max-parallel: 1
    environment: ${{ matrix.region }}
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Check component filter
        id: check
        run: |
          COMPONENT="${{ github.event.inputs.component }}"
          REGION="${{ matrix.region }}"
          if [[ "${{ github.event_name }}" != "workflow_dispatch" ]] || [[ "$COMPONENT" == "all" ]] || [[ "$COMPONENT" == "$REGION" ]]; then
            echo "skip=false" >> $GITHUB_OUTPUT
          else
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "Skipping $REGION (component filter: $COMPONENT)"
          fi
      - uses: actions/checkout@v4
        if: steps.check.outputs.skip != 'true'
        with:
          ref: ${{ github.event_name == 'issue_comment' && format('refs/pull/{0}/head', github.event.issue.number) || github.ref }}
      - name: Configure AWS Credentials
        if: steps.check.outputs.skip != 'true'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Terraform Destroy
        if: steps.check.outputs.skip != 'true'
        uses: dflook/terraform-destroy@v2
        with:
          path: environments/${{ matrix.region }}
          variables: |
            sns_topic_arn = "${{ secrets.SNS_TOPIC_ARN }}"
            send_sns = true

  destroy-global:
    name: Destroy Global
    runs-on: ubuntu-latest
    needs: [destroy-regions]
    if: |
      always() && needs.destroy-regions.result == 'success' && (
        (github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'destroy' &&
         (github.event.inputs.component == 'all' || github.event.inputs.component == 'global')) ||
        (github.event_name == 'issue_comment' && github.event.issue.pull_request &&
         contains(github.event.comment.body, 'terraform destroy') &&
         !contains(github.event.comment.body, 'terraform destroy-plan'))
      )
    environment: global
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'issue_comment' && format('refs/pull/{0}/head', github.event.issue.number) || github.ref }}
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}
      - name: Terraform Destroy
        uses: dflook/terraform-destroy@v2
        with:
          path: environments/global
